<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>最後的火柴人：無盡屍潮</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a202c; 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
            /* 強制關閉文字選取，避免點擊反藍 */
            -webkit-user-select: none; 
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none; 
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated; 
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .health-bar-container {
            width: 150px;
            height: 15px;
            background: #4a5568;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #2d3748;
            margin-top: 5px;
        }
        #health-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #e53e3e, #c53030);
            width: 100%;
            transition: width 0.2s;
        }
        .bottom-bar {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 8px;
            padding-bottom: 10px;
            pointer-events: auto; 
        }
        .inventory-slot {
            width: 45px;
            height: 45px;
            background: rgba(45, 55, 72, 0.8);
            border: 2px solid #4a5568;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .inventory-slot.active {
            border-color: #ecc94b; 
            box-shadow: 0 0 10px rgba(236, 201, 75, 0.5);
            transform: translateY(-3px);
        }
        .inventory-slot.empty { opacity: 0.5; }
        .slot-key {
            position: absolute;
            top: -6px; left: -6px;
            background: #2d3748;
            border: 1px solid #718096;
            border-radius: 50%;
            width: 18px; height: 18px;
            display: flex; justify-content: center; align-items: center;
            font-size: 10px; font-weight: bold;
        }
        .weapon-name {
            font-size: 9px; text-align: center; margin-top: 2px; word-break: break-all;
        }
        .ammo-count {
            font-size: 11px; font-weight: bold; color: #ecc94b;
        }
        .drop-hint {
            position: absolute; bottom: -18px; font-size: 9px; color: #a0aec0; display: none;
        }
        .inventory-slot:hover .drop-hint { display: block; }
        
        #armor-display {
            position: absolute; bottom: 15px; left: 15px;
            background: rgba(0,0,0,0.6); padding: 5px 10px;
            border-radius: 8px; border: 1px solid #718096;
            display: flex; align-items: center; gap: 8px;
        }

        #turret-btn {
            position: absolute; bottom: 15px; right: 15px;
            background: linear-gradient(135deg, #3182ce, #2b6cb0);
            border: 2px solid #63b3ed; color: white;
            padding: 10px 15px; border-radius: 10px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            pointer-events: auto; opacity: 0.5; transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #turret-btn.ready { opacity: 1; animation: pulse 2s infinite; }
        #turret-btn:disabled { cursor: not-allowed; filter: grayscale(100%); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 179, 237, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(99, 179, 237, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 179, 237, 0); }
        }

        #damage-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0) 50%, rgba(255,0,0,0.3) 100%);
            opacity: 0; pointer-events: none; transition: opacity 0.1s;
        }

        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; pointer-events: auto;
        }
        .modal-content {
            background: #2d3748; padding: 40px; border-radius: 16px;
            border: 2px solid #4a5568; text-align: center; max-width: 500px;
        }
        .btn-primary {
            background: #e53e3e; color: white; border: none; padding: 12px 24px;
            font-size: 18px; font-weight: bold; border-radius: 8px;
            cursor: pointer; margin-top: 20px; transition: background 0.2s;
        }
        .btn-primary:hover { background: #c53030; }
        .controls-hint {
            margin-top: 20px; text-align: left; font-size: 14px; color: #cbd5e0;
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="canvas"></canvas>
    <div id="damage-overlay"></div>
    
    <div id="ui-layer">
        <div class="top-bar">
            <div class="stats-box">
                <div class="text-lg font-bold mb-1">生存時間: <span id="time-display" class="text-yellow-400">0</span> 秒</div>
                <div class="text-md">分數: <span id="score-display" class="text-green-400">0</span></div>
                <div class="text-xs text-gray-400">最高分: <span id="high-score-display">0</span></div>
            </div>
            
            <div class="stats-box flex flex-col items-end">
                <div class="text-md font-bold">HP: <span id="hp-text">100</span>/100</div>
                <div class="health-bar-container"><div id="health-bar-fill"></div></div>
                <div class="text-xs mt-1 text-red-300">擊殺: <span id="kills-display">0</span></div>
            </div>
        </div>

        <div id="armor-display">
            <div id="armor-icon" class="w-6 h-6 rounded-full bg-gray-600 flex items-center justify-center border border-gray-400 text-xs">無</div>
            <div class="flex flex-col">
                <span class="text-[10px] text-gray-400 leading-tight">當前裝備</span>
                <span id="armor-name" class="font-bold text-sm leading-tight">無裝備</span>
            </div>
        </div>

        <button id="turret-btn" disabled>
            召喚砲塔 (T)<br><span id="turret-progress" class="text-xs font-normal">進度: 0/30</span>
        </button>

        <div class="bottom-bar" id="inventory-bar"></div>
    </div>

    <!-- 開始畫面 -->
    <div id="start-screen" class="modal">
        <div class="modal-content">
            <h1 class="text-4xl font-bold text-red-500 mb-2">最後的火柴人</h1>
            <h2 class="text-xl text-gray-300 mb-6">無盡屍潮</h2>
            <div class="controls-hint">
                <h3 class="font-bold text-yellow-400 mb-2">操作說明：</h3>
                <ul class="list-disc pl-5 space-y-1">
                    <li><b>A / D</b> 或 <b>左 / 右</b>：移動 (遇樓梯自動上)</li>
                    <li><b>Ctrl</b>：按住可跑步加速</li>
                    <li><b>W</b> 或 <b>空白鍵</b>：跳躍 (可二段跳)</li>
                    <li><b>滑鼠左鍵</b>：射擊 (近距用刀必中)</li>
                    <li><b>1 ~ 5</b> 或 <b>點擊底部</b>：切換武器</li>
                    <li><b>G</b>：丟棄當前手持物品</li>
                    <li><b>T</b>：放置自動砲塔</li>
                </ul>
            </div>
            <button id="start-btn" class="btn-primary">開始生存</button>
        </div>
    </div>

    <!-- 死亡畫面 -->
    <div id="game-over-screen" class="modal" style="display: none;">
        <div class="modal-content">
            <h1 class="text-5xl font-bold text-red-600 mb-4">你被感染了</h1>
            <div class="text-2xl mb-2">存活時間: <span id="final-time" class="text-yellow-400">0</span> 秒</div>
            <div class="text-2xl mb-2">總擊殺: <span id="final-kills" class="text-red-400">0</span></div>
            <div class="text-3xl font-bold mt-4 mb-6">最終分數: <span id="final-score" class="text-green-400">0</span></div>
            <button id="restart-btn" class="btn-primary">再次挑戰</button>
        </div>
    </div>
</div>

<script>
// ==========================================
// 1. 全域設定與常數
// ==========================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const ZOOM = 1.5; 
const WORLD_WIDTH = 6000;
const WORLD_HEIGHT = 1200;
const camera = { x: 0, y: 0, width: 0, height: 0, bounds: { minX: 0, maxX: WORLD_WIDTH, minY: 0, maxY: WORLD_HEIGHT } };

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    camera.width = canvas.width / ZOOM;
    camera.height = canvas.height / ZOOM;
}
window.addEventListener('resize', resizeCanvas); resizeCanvas();

const STATE = { START: 0, PLAYING: 1, GAMEOVER: 2 };
let gameState = STATE.START;
const GRAVITY = 0.6; const FRICTION = 0.8;
let lastTime = 0; let deltaTime = 0; let gameTime = 0; let gameFrame = 0;
let score = 0; let highScore = localStorage.getItem('stickman_highscore') || 0;
let kills = 0; let totalKills = 0;
document.getElementById('high-score-display').innerText = highScore;

// ==========================================
// 2. 裝備與武器資料庫
// ==========================================
const ARMORS = {
    NONE: { level: 0, name: '無裝備', color: '#cbd5e0', reduceDamageChance: 0 },
    LEATHER: { level: 1, name: '皮革裝', color: '#8b4513', reduceDamageChance: 0.2 },
    IRON: { level: 2, name: '鐵裝', color: '#a0aec0', reduceDamageChance: 0.5 },
    DIAMOND: { level: 3, name: '鑽石裝', color: '#4fd1c5', reduceDamageChance: 0.8 }
};
const WEAPONS = {
    KNIFE: { id: 'KNIFE', name: '戰術小刀', type: 'melee', mag: Infinity, maxAmmo: Infinity, damage: 30, fireRate: 30, range: 60, spread: 0, bulletSpeed: 0, color: '#a0aec0' },
    PISTOL: { id: 'PISTOL', name: '手槍', type: 'ranged', mag: 12, maxAmmo: 72, damage: 15, fireRate: 15, range: 800, spread: 0.05, bulletSpeed: 20, color: '#e2e8f0' },
    SMG: { id: 'SMG', name: '衝鋒槍', type: 'ranged', mag: 30, maxAmmo: 180, damage: 10, fireRate: 5, range: 600, spread: 0.15, bulletSpeed: 18, color: '#718096' },
    RIFLE: { id: 'RIFLE', name: '步槍', type: 'ranged', mag: 30, maxAmmo: 120, damage: 25, fireRate: 10, range: 1000, spread: 0.02, bulletSpeed: 25, color: '#4a5568' },
    SHOTGUN: { id: 'SHOTGUN', name: '散彈槍', type: 'ranged', mag: 8, maxAmmo: 40, damage: 15, fireRate: 45, range: 400, spread: 0.3, bulletSpeed: 15, color: '#c53030', pellets: 5, knockback: 10 },
    SNIPER: { id: 'SNIPER', name: '狙擊槍', type: 'ranged', mag: 5, maxAmmo: 25, damage: 100, fireRate: 60, range: 1500, spread: 0, bulletSpeed: 40, color: '#2b6cb0', penetrate: true },
    RPG: { id: 'RPG', name: '火箭筒', type: 'ranged', mag: 1, maxAmmo: 5, damage: 200, fireRate: 90, range: 1200, spread: 0, bulletSpeed: 12, color: '#276749', explosive: true, explosionRadius: 150 }
};

// ==========================================
// 3. 輸入控制
// ==========================================
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (gameState === STATE.PLAYING && player) {
        if ((e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') && player.jumps > 0) {
            player.vy = player.jumpForce; player.jumps--;
            createParticles(player.x + player.width/2, player.y + player.height, '#fff', 5, 2);
        }
    }
});
window.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (gameState === STATE.PLAYING) {
        if (e.code === 'Digit1') player.inventory.equipSlot(0);
        if (e.code === 'Digit2') player.inventory.equipSlot(1);
        if (e.code === 'Digit3') player.inventory.equipSlot(2);
        if (e.code === 'Digit4') player.inventory.equipSlot(3);
        if (e.code === 'Digit5') player.inventory.equipSlot(4);
        if (e.code === 'KeyG') player.inventory.dropCurrent();
        if (e.code === 'KeyT') placeTurret();
    }
});

const mouse = { x: 0, y: 0, isDown: false, worldX: 0, worldY: 0 };
window.addEventListener('mousemove', e => {
    mouse.x = e.clientX; mouse.y = e.clientY;
    mouse.worldX = (mouse.x / ZOOM) + camera.x; mouse.worldY = (mouse.y / ZOOM) + camera.y;
});
window.addEventListener('mousedown', e => {
    if (e.target.closest('.inventory-slot') || e.target.closest('#turret-btn')) return;
    mouse.isDown = true;
});
window.addEventListener('mouseup', () => mouse.isDown = false);

// ==========================================
// 4. 遊戲物件類別定義
// ==========================================
class Building {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.width = w; this.height = h; this.color = '#2d3748';
    }
    draw() {
        ctx.fillStyle = this.color; ctx.fillRect(this.x - camera.x, this.y - camera.y, this.width, this.height);
        ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 2; ctx.strokeRect(this.x - camera.x, this.y - camera.y, this.width, this.height);
    }
}
let buildings = [];

class Chest {
    constructor(x, y) {
        this.x = x; this.y = y; this.width = 40; this.height = 30; this.hp = 50; this.color = '#d69e2e';
    }
    takeDamage(amount) {
        this.hp -= amount;
        createParticles(this.x + this.width/2, this.y + this.height/2, '#ecc94b', 3, 2);
        if (this.hp <= 0) this.open();
    }
    open() {
        let numDrops = Math.floor(Math.random() * 3) + 2; // 掉 2~4 個
        for (let i = 0; i < numDrops; i++) {
            let rand = Math.random();
            let type = rand < 0.2 ? 'HEAL' : (rand < 0.5 ? 'ARMOR' : 'WEAPON');
            let data;
            if (type === 'ARMOR') {
                let armRand = Math.random();
                if (armRand < 0.2) data = ARMORS.DIAMOND; else if (armRand < 0.6) data = ARMORS.IRON; else data = ARMORS.LEATHER;
            } else if (type === 'WEAPON') {
                let wRand = Math.random();
                if (wRand < 0.1) data = WEAPONS.RPG; else if (wRand < 0.2) data = WEAPONS.SNIPER;
                else if (wRand < 0.4) data = WEAPONS.SHOTGUN; else if (wRand < 0.7) data = WEAPONS.RIFLE;
                else if (wRand < 0.9) data = WEAPONS.SMG; else data = WEAPONS.PISTOL;
            }
            let drop = new DropItem(this.x + this.width/2, this.y, type);
            if (type === 'ARMOR') drop.armorData = data;
            if (type === 'WEAPON') drop.weaponData = {...data};
            drop.vx = (Math.random() - 0.5) * 8; drop.vy = -5 - Math.random() * 6;
            drops.push(drop);
        }
        checkDropLimit();
        let index = chests.indexOf(this); if (index > -1) chests.splice(index, 1);
    }
    draw() {
        let drawX = this.x - camera.x; let drawY = this.y - camera.y;
        ctx.fillStyle = this.color; ctx.fillRect(drawX, drawY, this.width, this.height);
        ctx.strokeStyle = '#975a16'; ctx.lineWidth = 2; ctx.strokeRect(drawX, drawY, this.width, this.height);
        ctx.fillStyle = '#718096'; ctx.fillRect(drawX + this.width/2 - 4, drawY + 10, 8, 10);
    }
}
let chests = [];

class Player {
    constructor(x, y) {
        this.x = x; this.y = y; this.width = 20; this.height = 40;
        this.vx = 0; this.vy = 0; this.normalSpeed = 5; this.runSpeed = 9;
        this.jumpForce = -12; this.grounded = false; this.jumps = 0; this.maxJumps = 2;
        this.maxHp = 100; this.hp = this.maxHp; this.armor = ARMORS.NONE;
        this.isInvulnerable = false; this.invulnerableTimer = 0;
        this.facingRight = true; this.fireCooldown = 0;
        this.inventory = {
            slots: [{ weapon: {...WEAPONS.PISTOL}, currentAmmo: WEAPONS.PISTOL.maxAmmo }, null, null, null, null],
            activeSlot: 0,
            getCurrentWeapon() { return this.slots[this.activeSlot]; },
            equipSlot(index) { if (index >= 0 && index < 5 && this.slots[index]) { this.activeSlot = index; updateInventoryUI(); } },
            pickup(item) {
                if (item.type === 'HEAL') {
                    if (player.hp < player.maxHp) { player.heal(30); createFloatingText(player.x, player.y, "+30 HP", "#48bb78"); return true; } return false;
                }
                if (item.type === 'ARMOR') {
                    if (item.armorData.level > player.armor.level) {
                        player.armor = item.armorData; updateArmorUI(); createFloatingText(player.x, player.y, `裝備: ${item.armorData.name}`, item.armorData.color); return true;
                    } return false; 
                }
                if (item.type === 'WEAPON') {
                    let existingIndex = -1;
                    for (let i = 0; i < 5; i++) { if (this.slots[i] && this.slots[i].weapon.id === item.weaponData.id) { existingIndex = i; break; } }
                    if (existingIndex !== -1) {
                        let w = this.slots[existingIndex]; let addAmount = Math.ceil(w.weapon.maxAmmo / 2);
                        if (w.weapon.id === 'KNIFE') return true; 
                        w.currentAmmo = Math.min(w.currentAmmo + addAmount, w.weapon.maxAmmo);
                        createFloatingText(player.x, player.y, `+${addAmount} 子彈`, "#ecc94b"); updateInventoryUI(); return true;
                    } else {
                        for (let i = 0; i < 5; i++) {
                            if (!this.slots[i]) {
                                this.slots[i] = { weapon: {...item.weaponData}, currentAmmo: item.weaponData.maxAmmo };
                                createFloatingText(player.x, player.y, `拾取: ${item.weaponData.name}`, "#e2e8f0"); updateInventoryUI(); return true;
                            }
                        }
                        createFloatingText(player.x, player.y, "背包已滿 (按 G 丟棄)", "#f56565"); return false;
                    }
                } return false;
            },
            dropCurrent() {
                let current = this.slots[this.activeSlot]; if (!current) return;
                let drop = new DropItem(player.x, player.y - 20, 'WEAPON'); drop.weaponData = {...current.weapon};
                drop.vx = player.facingRight ? 3 : -3; drop.vy = -5; drops.push(drop); checkDropLimit();
                this.slots[this.activeSlot] = null;
                for(let i=0; i<5; i++) { if(this.slots[i]) { this.activeSlot = i; break; } }
                updateInventoryUI();
            }
        };
    }

    update() {
        let currentSpeed = (keys['ControlLeft'] || keys['ControlRight'] || keys['Control']) ? this.runSpeed : this.normalSpeed;
        if (keys['KeyA'] || keys['ArrowLeft']) { this.vx = -currentSpeed; this.facingRight = false; }
        else if (keys['KeyD'] || keys['ArrowRight']) { this.vx = currentSpeed; this.facingRight = true; }
        else { this.vx *= FRICTION; }

        // 嚴格分離的 AABB X 軸碰撞
        this.x += this.vx;
        if (this.x < camera.bounds.minX) this.x = camera.bounds.minX;
        if (this.x + this.width > camera.bounds.maxX) this.x = camera.bounds.maxX - this.width;

        for (let b of buildings) {
            if (this.x < b.x + b.width && this.x + this.width > b.x && this.y < b.y + b.height && this.y + this.height > b.y) {
                let obstacleHeight = (this.y + this.height) - b.y;
                if (obstacleHeight > 0 && obstacleHeight <= 45 && this.vy >= 0) {
                    this.y = b.y - this.height; this.vy = 0; this.grounded = true; // 跨階梯
                } else {
                    if (this.vx > 0) this.x = b.x - this.width;
                    else if (this.vx < 0) this.x = b.x + b.width;
                    this.vx = 0;
                }
            }
        }

        // 嚴格分離的 AABB Y 軸碰撞
        this.vy += GRAVITY;
        this.y += this.vy;
        this.grounded = false;

        const groundY = camera.bounds.maxY - 40;
        if (this.y + this.height > groundY) {
            this.y = groundY - this.height; this.vy = 0; this.grounded = true; this.jumps = this.maxJumps;
        }
        
        for (let b of buildings) {
            if (this.x < b.x + b.width && this.x + this.width > b.x && this.y < b.y + b.height && this.y + this.height > b.y) {
                if (this.vy > 0) { // 往下掉落
                    this.y = b.y - this.height; this.vy = 0; this.grounded = true; this.jumps = this.maxJumps;
                } else if (this.vy < 0) { // 往上跳撞天花板
                    this.y = b.y + b.height; this.vy = 0;
                }
            }
        }

        if (this.fireCooldown > 0) this.fireCooldown--;
        let currentItem = this.inventory.getCurrentWeapon();
        if (mouse.isDown && this.fireCooldown <= 0 && currentItem) this.fireWeapon(currentItem);
        if (this.isInvulnerable) { this.invulnerableTimer--; if (this.invulnerableTimer <= 0) this.isInvulnerable = false; }

        for (let i = drops.length - 1; i >= 0; i--) {
            let d = drops[i];
            if (this.x < d.x + d.width && this.x + this.width > d.x && this.y < d.y + d.height && this.y + this.height > d.y) {
                if (this.inventory.pickup(d)) drops.splice(i, 1);
            }
        }
    }

    fireWeapon(item) {
        let w = item.weapon;
        if (w.id !== 'KNIFE' && item.currentAmmo <= 0) {
            createFloatingText(this.x, this.y - 10, "沒有子彈！", "#f56565"); this.fireCooldown = 30; return;
        }
        if (w.id !== 'KNIFE') item.currentAmmo--;
        this.fireCooldown = w.fireRate; updateInventoryUI();

        let startX = this.x + this.width / 2; let startY = this.y + this.height / 2;
        mouse.worldX = (mouse.x / ZOOM) + camera.x; mouse.worldY = (mouse.y / ZOOM) + camera.y;
        let angle = Math.atan2(mouse.worldY - startY, mouse.worldX - startX);
        this.facingRight = mouse.worldX > startX;

        if (w.id === 'KNIFE') {
            createSlashEffect(startX, startY, angle);
            for (let z of zombies) {
                let dist = Math.hypot((z.x + z.width/2) - startX, (z.y + z.height/2) - startY);
                if (dist < w.range + 20) {
                    let angleToZ = Math.atan2((z.y + z.height/2) - startY, (z.x + z.width/2) - startX);
                    if (dist < 35 || Math.abs(angle - angleToZ) < Math.PI / 2 || Math.abs(angle - angleToZ) > 3 * Math.PI / 2) {
                        z.takeDamage(w.damage, this.facingRight ? 5 : -5);
                    }
                }
            }
            for (let c of chests) {
                let dist = Math.hypot((c.x + c.width/2) - startX, (c.y + c.height/2) - startY);
                if (dist < w.range + 20) c.takeDamage(w.damage);
            }
            return;
        }

        let pellets = w.pellets || 1;
        for (let i = 0; i < pellets; i++) {
            let finalAngle = angle + (Math.random() - 0.5) * w.spread;
            if (w.id === 'SHOTGUN') finalAngle = angle + (i - Math.floor(pellets/2)) * 0.1;
            bullets.push(new Bullet(startX, startY, finalAngle, w));
        }

        let recoil = w.damage / 10; if (w.id === 'RPG') recoil = 8;
        this.vx -= Math.cos(angle) * recoil;
        screenShake(w.damage / 5);
        createParticles(startX + Math.cos(angle)*20, startY + Math.sin(angle)*20, '#fff', 3, 2);
    }

    takeDamage(amount) {
        if (this.isInvulnerable || gameState !== STATE.PLAYING) return;
        if (Math.random() < this.armor.reduceDamageChance) {
            createFloatingText(this.x, this.y - 10, "抵擋！", this.armor.color);
            createParticles(this.x + this.width/2, this.y + this.height/2, this.armor.color, 5, 2);
            this.isInvulnerable = true; this.invulnerableTimer = 15; return;
        }
        this.hp -= 6.7; if (this.hp < 0) this.hp = 0;
        document.getElementById('damage-overlay').style.opacity = 1; setTimeout(() => { document.getElementById('damage-overlay').style.opacity = 0; }, 100);
        createParticles(this.x + this.width/2, this.y + this.height/2, '#e53e3e', 10, 3);
        this.isInvulnerable = true; this.invulnerableTimer = 30; updateUI();
        if (this.hp <= 0) gameOver();
    }
    heal(amount) { this.hp += amount; if (this.hp > this.maxHp) this.hp = this.maxHp; updateUI(); }

    draw() {
        if (this.isInvulnerable && gameFrame % 4 < 2) return;
        let drawX = this.x - camera.x; let drawY = this.y - camera.y;
        ctx.strokeStyle = this.armor.color; ctx.lineWidth = 3; ctx.beginPath();
        ctx.arc(drawX + this.width / 2, drawY + 8, 6, 0, Math.PI * 2);
        ctx.moveTo(drawX + this.width / 2, drawY + 14); ctx.lineTo(drawX + this.width / 2, drawY + 28);
        
        let legSwing = Math.sin(gameFrame * 0.2) * (Math.abs(this.vx) > 0.5 ? 6 : 0);
        if (!this.grounded) legSwing = 5; 
        ctx.moveTo(drawX + this.width / 2, drawY + 28); ctx.lineTo(drawX + this.width / 2 - 5 + legSwing, drawY + 40);
        ctx.moveTo(drawX + this.width / 2, drawY + 28); ctx.lineTo(drawX + this.width / 2 + 5 - legSwing, drawY + 40);
        ctx.stroke();

        let aimAngle = Math.atan2(mouse.worldY - (this.y + this.height/2), mouse.worldX - (this.x + this.width/2));
        let gunLength = 15; let currentItem = this.inventory.getCurrentWeapon();
        ctx.beginPath();
        ctx.moveTo(drawX + this.width / 2, drawY + 18); ctx.lineTo(drawX + this.width / 2 + Math.cos(aimAngle) * 10, drawY + 18 + Math.sin(aimAngle) * 10);
        ctx.stroke();

        if (currentItem && currentItem.weapon.id !== 'KNIFE') {
            ctx.strokeStyle = currentItem.weapon.color; ctx.lineWidth = 4; ctx.beginPath();
            let handX = drawX + this.width / 2 + Math.cos(aimAngle) * 10; let handY = drawY + 18 + Math.sin(aimAngle) * 10;
            if (currentItem.weapon.id === 'SNIPER' || currentItem.weapon.id === 'RPG') gunLength = 25;
            else if (currentItem.weapon.id === 'PISTOL') gunLength = 8;
            ctx.moveTo(handX, handY); ctx.lineTo(handX + Math.cos(aimAngle) * gunLength, handY + Math.sin(aimAngle) * gunLength); ctx.stroke();
        }
        ctx.fillStyle = '#2d3748'; ctx.fillRect(drawX, drawY - 10, this.width, 4);
        ctx.fillStyle = '#e53e3e'; ctx.fillRect(drawX, drawY - 10, this.width * (this.hp / this.maxHp), 4);
    }
}

class Bullet {
    constructor(x, y, angle, weaponData) {
        this.x = x; this.y = y; this.vx = Math.cos(angle) * weaponData.bulletSpeed; this.vy = Math.sin(angle) * weaponData.bulletSpeed;
        this.weapon = weaponData; this.distance = 0; this.active = true;
        this.radius = weaponData.id === 'RPG' ? 4 : 2; this.hitZombies = []; 
    }
    update() {
        if (!this.active) return;
        let speed = Math.hypot(this.vx, this.vy);
        let steps = Math.ceil(speed / 5); // 分段檢測防穿透
        let stepX = this.vx / steps; let stepY = this.vy / steps;

        for (let s = 0; s < steps; s++) {
            if (!this.active) break;
            this.x += stepX; this.y += stepY; this.distance += speed / steps;
            if (this.distance > this.weapon.range) { this.explode(); this.active = false; return; }

            const groundY = camera.bounds.maxY - 40;
            if (this.y > groundY) { this.explode(); this.active = false; return; }
            
            let hitWall = false;
            for (let b of buildings) { if (this.x > b.x && this.x < b.x + b.width && this.y > b.y && this.y < b.y + b.height) { hitWall = true; break; } }
            if (hitWall) { this.explode(); this.active = false; return; }

            for (let c of chests) {
                if (this.x > c.x && this.x < c.x + c.width && this.y > c.y && this.y < c.y + c.height) {
                    c.takeDamage(this.weapon.damage); this.explode(); this.active = false; return;
                }
            }

            for (let z of zombies) {
                if (!this.hitZombies.includes(z) && this.x > z.x && this.x < z.x + z.width && this.y > z.y && this.y < z.y + z.height) {
                    let knockback = this.weapon.knockback || (this.weapon.damage > 20 ? 3 : 1);
                    let dir = this.vx > 0 ? 1 : -1; z.takeDamage(this.weapon.damage, dir * knockback);
                    createParticles(this.x, this.y, '#000', 5, 2);
                    if (this.weapon.penetrate) { this.hitZombies.push(z); } else { this.explode(); this.active = false; return; }
                }
            }
        }
    }
    explode() {
        if (this.weapon.explosive) {
            createExplosion(this.x, this.y, this.weapon.explosionRadius); screenShake(10);
            for (let z of zombies) {
                let dist = Math.hypot(z.x + z.width/2 - this.x, z.y + z.height/2 - this.y);
                if (dist < this.weapon.explosionRadius) z.takeDamage(this.weapon.damage, (z.x > this.x ? 1 : -1) * 10);
            }
        } else { createParticles(this.x, this.y, '#e2e8f0', 3, 1); }
    }
    draw() {
        if (!this.active) return;
        ctx.fillStyle = this.weapon.color; ctx.beginPath(); ctx.arc(this.x - camera.x, this.y - camera.y, this.radius, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = `rgba(255,255,255,0.3)`; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(this.x - camera.x, this.y - camera.y); ctx.lineTo(this.x - this.vx - camera.x, this.y - this.vy - camera.y); ctx.stroke();
    }
}

class Zombie {
    constructor(x, y, isCrawler = false) {
        this.x = x; this.y = y; this.width = isCrawler ? 30 : 20; this.height = isCrawler ? 20 : 40;
        let timeMultiplier = 1 + (gameTime / 120); this.maxHp = 25 * timeMultiplier; this.hp = this.maxHp;
        this.baseSpeed = (Math.random() * 1 + 1) * (1 + (gameTime / 300)); this.vx = 0; this.vy = 0;
        this.state = 'WALK'; this.isCrawler = isCrawler; this.facingRight = Math.random() > 0.5; this.color = isCrawler ? '#9ae6b4' : '#4a5568';
    }
    update() {
        let targetX = player.x; let targetY = player.y;
        if (this.state !== 'CLIMB') {
            if (this.x < targetX - 10) { this.vx = this.baseSpeed; this.facingRight = true; }
            else if (this.x > targetX + 10) { this.vx = -this.baseSpeed; this.facingRight = false; }
            else { this.vx = 0; }
        }

        // 嚴格分離的 X 軸碰撞
        this.x += this.vx;
        let touchingWall = false; let wallObject = null;
        for (let b of buildings) {
            if (this.x < b.x + b.width && this.x + this.width > b.x && this.y < b.y + b.height && this.y + this.height > b.y) {
                let obstacleHeight = (this.y + this.height) - b.y;
                if (obstacleHeight > 0 && obstacleHeight <= 45 && this.vy >= 0) {
                    this.y = b.y - this.height; this.vy = 0;
                } else {
                    touchingWall = true; wallObject = b;
                    if (this.vx > 0) this.x = b.x - this.width; else if (this.vx < 0) this.x = b.x + b.width;
                }
            }
        }

        // 嚴格分離的 Y 軸碰撞
        this.vy += GRAVITY; this.y += this.vy; let grounded = false;
        const groundY = camera.bounds.maxY - 40;
        if (this.y + this.height > groundY) { this.y = groundY - this.height; this.vy = 0; grounded = true; }
        for (let b of buildings) {
            if (this.x < b.x + b.width && this.x + this.width > b.x && this.y < b.y + b.height && this.y + this.height > b.y) {
                if (this.vy > 0) { this.y = b.y - this.height; this.vy = 0; grounded = true; }
                else if (this.vy < 0) { this.y = b.y + b.height; this.vy = 0; }
            }
        }

        if (touchingWall && targetY < this.y - 20) {
            this.state = 'CLIMB'; this.vx = 0; this.vy = -this.baseSpeed * 0.8; this.x += (this.facingRight ? 1 : -1); 
        } else if (this.state === 'CLIMB') {
            let stillOnWall = false;
            if (wallObject && (this.y + this.height > wallObject.y && this.y < wallObject.y + wallObject.height)) stillOnWall = true;
            if (!stillOnWall || targetY >= this.y) { this.state = 'FALL'; this.vy = 0; }
        } else { this.state = grounded ? 'WALK' : 'FALL'; }

        if (this.x < player.x + player.width && this.x + this.width > player.x && this.y < player.y + player.height && this.y + this.height > player.y) {
            player.takeDamage(1);
        }
        for (let i = turrets.length - 1; i >= 0; i--) {
            let t = turrets[i];
            if (this.x < t.x + t.width && this.x + this.width > t.x && this.y < t.y + t.height && this.y + this.height > t.y) {
                t.hp -= 0.5; this.vx = 0; if (t.hp <= 0) { createExplosion(t.x + t.width/2, t.y + t.height/2, 30); turrets.splice(i, 1); }
            }
        }
    }
    takeDamage(amount, knockbackX) {
        this.hp -= amount; this.x += knockbackX;
        if (this.state === 'CLIMB') { this.state = 'FALL'; this.vy = 0; }
        this.isHit = true; setTimeout(() => this.isHit = false, 100);
        if (this.hp <= 0) this.die();
    }
    die() {
        createParticles(this.x + this.width/2, this.y + this.height/2, '#000', 15, 3);
        this.rollDrop(); score += 10; kills++; totalKills++; updateUI(); checkTurretUnlock();
        let index = zombies.indexOf(this); if (index > -1) zombies.splice(index, 1);
    }
    rollDrop() {
        if (Math.random() > 0.2) return;
        let rand = Math.random(); let type, data;
        if (rand < 0.1) { type = 'HEAL'; }
        else if (rand < 0.3) {
            type = 'ARMOR'; let armRand = Math.random(); let timeBonus = Math.min(gameTime / 600, 0.2); 
            if (armRand < 0.1 + timeBonus) data = ARMORS.DIAMOND; else if (armRand < 0.4 + timeBonus) data = ARMORS.IRON; else data = ARMORS.LEATHER;
        } else {
            type = 'WEAPON'; let wRand = Math.random(); let timeBonus = Math.min(gameTime / 600, 0.1);
            if (wRand < 0.05 + timeBonus) data = WEAPONS.RPG; else if (wRand < 0.15 + timeBonus) data = WEAPONS.SNIPER;
            else if (wRand < 0.35) data = WEAPONS.SHOTGUN; else if (wRand < 0.6) data = WEAPONS.RIFLE;
            else if (wRand < 0.8) data = WEAPONS.SMG; else data = WEAPONS.PISTOL;
        }
        let drop = new DropItem(this.x, this.y, type);
        if (type === 'ARMOR') drop.armorData = data; if (type === 'WEAPON') drop.weaponData = {...data}; 
        drop.vx = (Math.random() - 0.5) * 4; drop.vy = -3 - Math.random() * 3;
        drops.push(drop); checkDropLimit();
    }
    draw() {
        let drawX = this.x - camera.x; let drawY = this.y - camera.y;
        ctx.strokeStyle = this.isHit ? '#fff' : (this.color === '#000' ? '#2d3748' : this.color); ctx.lineWidth = 3; ctx.beginPath();
        if (this.isCrawler) {
            ctx.arc(drawX + 8, drawY + 10, 5, 0, Math.PI * 2); ctx.moveTo(drawX + 13, drawY + 10); ctx.lineTo(drawX + 25, drawY + 15); 
            ctx.moveTo(drawX + 10, drawY + 15); ctx.lineTo(drawX + 5, drawY + 20); ctx.moveTo(drawX + 20, drawY + 15); ctx.lineTo(drawX + 25, drawY + 20);
        } else {
            ctx.arc(drawX + this.width / 2, drawY + 8, 6, 0, Math.PI * 2); ctx.fillStyle = '#f56565';
            let eyeX = this.facingRight ? drawX + this.width/2 + 2 : drawX + this.width/2 - 2; ctx.fillRect(eyeX, drawY + 6, 2, 2);
            ctx.moveTo(drawX + this.width / 2, drawY + 14); ctx.lineTo(drawX + this.width / 2, drawY + 28);
            let anim = Math.sin(gameFrame * 0.2);
            if (this.state === 'WALK') {
                let handDir = this.facingRight ? 1 : -1;
                ctx.moveTo(drawX + this.width / 2, drawY + 16); ctx.lineTo(drawX + this.width / 2 + handDir * 12, drawY + 16);
                ctx.moveTo(drawX + this.width / 2, drawY + 28); ctx.lineTo(drawX + this.width / 2 - 5 + anim*5, drawY + 40);
                ctx.moveTo(drawX + this.width / 2, drawY + 28); ctx.lineTo(drawX + this.width / 2 + 5 - anim*5, drawY + 40);
            } else if (this.state === 'CLIMB') {
                ctx.moveTo(drawX + this.width / 2, drawY + 16); ctx.lineTo(drawX + this.width / 2 + (anim>0?8:-8), drawY + 8); 
                ctx.moveTo(drawX + this.width / 2, drawY + 28); ctx.lineTo(drawX + this.width / 2 - 8, drawY + 35 + anim*3);
                ctx.moveTo(drawX + this.width / 2, drawY + 28); ctx.lineTo(drawX + this.width / 2 + 8, drawY + 35 - anim*3);
            } else {
                ctx.moveTo(drawX + this.width / 2, drawY + 16); ctx.lineTo(drawX + this.width / 2 + (this.facingRight?10:-10), drawY + 10);
                ctx.moveTo(drawX + this.width / 2, drawY + 28); ctx.lineTo(drawX + this.width / 2 - 5, drawY + 35);
                ctx.moveTo(drawX + this.width / 2, drawY + 28); ctx.lineTo(drawX + this.width / 2 + 5, drawY + 38);
            }
        }
        ctx.stroke();
        if (this.hp < this.maxHp) {
            ctx.fillStyle = '#2d3748'; ctx.fillRect(drawX, drawY - 8, this.width, 3);
            ctx.fillStyle = '#e53e3e'; ctx.fillRect(drawX, drawY - 8, this.width * (this.hp / this.maxHp), 3);
        }
    }
}

class DropItem {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.width = 15; this.height = 15;
        this.type = type; this.weaponData = null; this.armorData = null;
        this.vx = 0; this.vy = 0; this.age = 0; this.floatOffset = Math.random() * Math.PI * 2;
    }
    update() {
        this.age++; 
        
        // 分離 X 軸碰撞 (碰到牆反彈)
        this.x += this.vx; this.vx *= 0.99; 
        if (this.x < camera.bounds.minX) { this.x = camera.bounds.minX; this.vx *= -0.5; }
        if (this.x + this.width > camera.bounds.maxX) { this.x = camera.bounds.maxX - this.width; this.vx *= -0.5; }
        for (let b of buildings) {
            if (this.x < b.x + b.width && this.x + this.width > b.x && this.y < b.y + b.height && this.y + this.height > b.y) {
                if (this.vx > 0) this.x = b.x - this.width; else if (this.vx < 0) this.x = b.x + b.width;
                this.vx *= -0.5;
            }
        }

        // 分離 Y 軸碰撞
        this.vy += GRAVITY; this.y += this.vy;
        const groundY = camera.bounds.maxY - 40;
        if (this.y + this.height > groundY) { this.y = groundY - this.height; this.vy = 0; this.vx *= 0.8; }
        for (let b of buildings) {
            if (this.x < b.x + b.width && this.x + this.width > b.x && this.y < b.y + b.height && this.y + this.height > b.y) {
                if (this.vy > 0) { this.y = b.y - this.height; this.vy = 0; this.vx *= 0.8; }
                else if (this.vy < 0) { this.y = b.y + b.height; this.vy = 0; }
            }
        }
    }
    draw() {
        let drawX = this.x - camera.x; let drawY = this.y - camera.y + Math.sin(gameFrame * 0.1 + this.floatOffset) * 3;
        ctx.save(); ctx.translate(drawX + this.width/2, drawY + this.height/2);
        if (this.type === 'HEAL') {
            ctx.fillStyle = 'white'; ctx.fillRect(-8, -6, 16, 12); ctx.fillStyle = '#e53e3e'; ctx.fillRect(-2, -4, 4, 8); ctx.fillRect(-4, -2, 8, 4);
        } else if (this.type === 'ARMOR') {
            ctx.fillStyle = this.armorData.color; ctx.beginPath(); ctx.moveTo(-6, -8); ctx.lineTo(6, -8); ctx.lineTo(6, 2); ctx.lineTo(0, 8); ctx.lineTo(-6, 2);
            ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth=1; ctx.stroke();
        } else if (this.type === 'WEAPON') {
            ctx.fillStyle = this.weaponData.color; ctx.fillRect(-6, -2, 12, 4); ctx.fillRect(-2, 2, 4, 4); ctx.fillRect(4, -2, 4, 2); 
            ctx.shadowColor = this.weaponData.color; ctx.shadowBlur = 5; ctx.strokeStyle = '#fff'; ctx.strokeRect(-6,-2,12,4); ctx.shadowBlur = 0;
        }
        ctx.restore();
    }
}
function checkDropLimit() { if (drops.length > 20) { drops.sort((a, b) => b.age - a.age); drops.shift(); } }

class Turret {
    constructor(x, y) {
        this.x = x; this.y = y; this.width = 24; this.height = 30; this.hp = 100; this.maxHp = 100;
        this.range = 400; this.fireRate = 10; this.cooldown = 0; this.damage = 15; this.targetAngle = 0; this.currentAngle = 0;
    }
    update() {
        if (this.cooldown > 0) this.cooldown--;
        let nearestDist = this.range; let target = null;
        for (let z of zombies) {
            let dist = Math.hypot(z.x + z.width/2 - (this.x + this.width/2), z.y + z.height/2 - (this.y + 10));
            if (dist < nearestDist) { nearestDist = dist; target = z; }
        }
        if (target) {
            this.targetAngle = Math.atan2(target.y + target.height/2 - (this.y + 10), target.x + target.width/2 - (this.x + this.width/2));
            let diff = this.targetAngle - this.currentAngle;
            while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2;
            this.currentAngle += diff * 0.2;
            if (this.cooldown <= 0) {
                let dummyWeapon = { damage: this.damage, bulletSpeed: 20, color: '#ecc94b', range: this.range, id: 'TURRET' };
                let bx = this.x + this.width/2 + Math.cos(this.currentAngle) * 15; let by = this.y + 10 + Math.sin(this.currentAngle) * 15;
                bullets.push(new Bullet(bx, by, this.currentAngle, dummyWeapon)); this.cooldown = this.fireRate; createParticles(bx, by, '#ecc94b', 2, 1);
            }
        }
        this.y += GRAVITY; const groundY = camera.bounds.maxY - 40; if (this.y + this.height > groundY) { this.y = groundY - this.height; }
        for (let b of buildings) { if (this.x < b.x + b.width && this.x + this.width > b.x && this.y < b.y + b.height && this.y + this.height > b.y) { if (this.y + this.height - GRAVITY <= b.y) this.y = b.y - this.height; } }
    }
    draw() {
        let drawX = this.x - camera.x; let drawY = this.y - camera.y;
        ctx.fillStyle = '#4a5568'; ctx.beginPath(); ctx.moveTo(drawX, drawY + this.height); ctx.lineTo(drawX + this.width, drawY + this.height);
        ctx.lineTo(drawX + this.width - 4, drawY + 15); ctx.lineTo(drawX + 4, drawY + 15); ctx.fill(); ctx.strokeStyle = '#2d3748'; ctx.stroke();
        ctx.save(); ctx.translate(drawX + this.width/2, drawY + 10); ctx.rotate(this.currentAngle);
        ctx.fillStyle = '#718096'; ctx.fillRect(0, -3, 18, 6); ctx.fillStyle = '#3182ce'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#2b6cb0'; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
        ctx.fillStyle = '#e53e3e'; ctx.fillRect(drawX, drawY - 8, this.width * (this.hp / this.maxHp), 4);
    }
}

// 5. 視覺特效系統
// ==========================================
let particles = [];
function createParticles(x, y, color, count, speedBase) {
    for (let i = 0; i < count; i++) {
        particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * speedBase * 2, vy: (Math.random() - 0.5) * speedBase * 2 - 1, life: 1.0, color: color, size: Math.random() * 3 + 1 });
    }
}
function createExplosion(x, y, radius) {
    for(let i=0; i<30; i++) {
        let angle = Math.random() * Math.PI * 2; let speed = Math.random() * (radius / 10);
        particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, color: '#dd6b20', size: Math.random()*5+2, decay: 0.05 });
    }
}
let floatingTexts = []; function createFloatingText(x, y, text, color) { floatingTexts.push({ x: x, y: y, text: text, color: color, life: 1.0, vy: -1 }); }
let screenShakeAmount = 0; function screenShake(amount) { screenShakeAmount = Math.min(screenShakeAmount + amount, 20); }
let slashEffects = []; function createSlashEffect(x, y, angle) { slashEffects.push({ x: x, y: y, angle: angle, life: 1.0 }); }

// ==========================================
// 6. 遊戲管理與迴圈
// ==========================================
let player, bullets, zombies, drops, turrets;
let nextTurretGoal = 30; let turretsUnlocked = 0; 

function initGame() {
    score = 0; kills = 0; totalKills = 0; gameTime = 0; gameFrame = 0; nextTurretGoal = 30; turretsUnlocked = 0;
    player = new Player(WORLD_WIDTH / 2, camera.bounds.maxY - 100);
    bullets = []; zombies = []; drops = []; turrets = []; particles = []; floatingTexts = []; chests = [];
    buildings = [];
    
    let numBuildings = Math.floor(Math.random() * 4) + 6;
    let sectionWidth = WORLD_WIDTH / numBuildings;
    
    for (let i = 0; i < numBuildings; i++) {
        let w = 150 + Math.random() * 200; let h = 100 + Math.random() * 200; 
        let x = i * sectionWidth + (Math.random() * (sectionWidth - w));
        x = Math.max(camera.bounds.minX + 50, Math.min(x, camera.bounds.maxX - w - 50));
        let y = camera.bounds.maxY - 40 - h; 
        
        buildings.push(new Building(x, y, w, h));
        
        let stepW = 45; let stepH = 40; let numSteps = Math.floor(h / stepH);
        for(let s=1; s<=numSteps; s++) { let sx = x - s * stepW; let sh = h - s * stepH; if (sh > 0) buildings.push(new Building(sx, camera.bounds.maxY - 40 - sh, stepW, sh)); }
        for(let s=1; s<=numSteps; s++) { let sx = x + w + (s-1) * stepW; let sh = h - s * stepH; if (sh > 0) buildings.push(new Building(sx, camera.bounds.maxY - 40 - sh, stepW, sh)); }
        
        // 完整的寶箱生成邏輯
        if (Math.random() > 0.3) {
            chests.push(new Chest(x + w/2 - 20, y - 30));
        }
    }
    
    let knifeDrop = new DropItem(player.x + 50, player.y - 20, 'WEAPON'); knifeDrop.weaponData = {...WEAPONS.KNIFE}; drops.push(knifeDrop);

    updateUI(); updateInventoryUI(); updateArmorUI(); updateTurretUI();
    gameState = STATE.PLAYING;
    document.getElementById('start-screen').style.display = 'none'; document.getElementById('game-over-screen').style.display = 'none';
    requestAnimationFrame(gameLoop);
}

function updateUI() {
    document.getElementById('score-display').innerText = score; document.getElementById('hp-text').innerText = Math.ceil(player.hp);
    document.getElementById('health-bar-fill').style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`; document.getElementById('kills-display').innerText = totalKills;
}

function updateInventoryUI() {
    const bar = document.getElementById('inventory-bar'); bar.innerHTML = '';
    for (let i = 0; i < 5; i++) {
        let slotData = player.inventory.slots[i];
        let div = document.createElement('div'); div.className = `inventory-slot ${i === player.inventory.activeSlot ? 'active' : ''} ${!slotData ? 'empty' : ''}`;
        let keyLabel = document.createElement('div'); keyLabel.className = 'slot-key'; keyLabel.innerText = i + 1; div.appendChild(keyLabel);
        if (slotData) {
            let name = document.createElement('div'); name.className = 'weapon-name'; name.innerText = slotData.weapon.name; name.style.color = slotData.weapon.color; div.appendChild(name);
            let ammo = document.createElement('div'); ammo.className = 'ammo-count'; ammo.innerText = slotData.weapon.id === 'KNIFE' ? '∞' : slotData.currentAmmo; div.appendChild(ammo);
            let dropHint = document.createElement('div'); dropHint.className = 'drop-hint'; dropHint.innerText = '按 G 丟棄'; div.appendChild(dropHint);
        }
        div.onclick = () => player.inventory.equipSlot(i); bar.appendChild(div);
    }
}

function updateArmorUI() {
    const icon = document.getElementById('armor-icon'); const name = document.getElementById('armor-name');
    icon.style.backgroundColor = player.armor.color; name.innerText = player.armor.name; name.style.color = player.armor.color;
}

function checkTurretUnlock() {
    if (kills >= nextTurretGoal) {
        turretsUnlocked++; kills -= nextTurretGoal; nextTurretGoal = 30 + (turretsUnlocked + turrets.length) * 30; 
        createFloatingText(player.x, player.y - 30, "砲塔已就緒！(按 T)", "#63b3ed"); updateTurretUI();
    }
    document.getElementById('turret-progress').innerText = `進度: ${kills}/${nextTurretGoal}`;
}

function updateTurretUI() {
    const btn = document.getElementById('turret-btn');
    if (turretsUnlocked > 0) {
        btn.disabled = false; btn.classList.add('ready');
        btn.innerHTML = `召喚砲塔 (T) <span class="bg-red-500 rounded-full px-2 py-0.5 ml-1">${turretsUnlocked}</span><br><span id="turret-progress" class="text-xs font-normal">進度: ${kills}/${nextTurretGoal}</span>`;
    } else {
        btn.disabled = true; btn.classList.remove('ready');
        btn.innerHTML = `召喚砲塔 (T)<br><span id="turret-progress" class="text-xs font-normal">進度: ${kills}/${nextTurretGoal}</span>`;
    }
}

function placeTurret() {
    if (turretsUnlocked > 0) { turretsUnlocked--; let tx = player.x + (player.facingRight ? 30 : -50); turrets.push(new Turret(tx, player.y)); updateTurretUI(); }
}
document.getElementById('turret-btn').addEventListener('click', () => { if(gameState === STATE.PLAYING) placeTurret(); });

let zombieSpawnTimer = 0;
function spawnZombies() {
    zombieSpawnTimer += deltaTime; let spawnInterval = Math.max(0.5, 3.0 - (gameTime / 60)); 
    if (zombieSpawnTimer >= spawnInterval) {
        zombieSpawnTimer = 0; let spawnX;
        if (Math.random() > 0.5) { spawnX = camera.x - 50; if (spawnX < camera.bounds.minX) spawnX = camera.bounds.minX; } 
        else { spawnX = camera.x + camera.width + 50; if (spawnX > camera.bounds.maxX) spawnX = camera.bounds.maxX; }
        let isCrawler = gameTime > 60 && Math.random() < 0.2 + (gameTime / 600);
        let spawnY = camera.bounds.maxY - 100; zombies.push(new Zombie(spawnX, spawnY, isCrawler));
    }
}

function gameOver() {
    gameState = STATE.GAMEOVER;
    if (score > highScore) { highScore = score; localStorage.setItem('stickman_highscore', highScore); document.getElementById('high-score-display').innerText = highScore; }
    document.getElementById('final-time').innerText = gameTime; document.getElementById('final-kills').innerText = totalKills; document.getElementById('final-score').innerText = score;
    setTimeout(() => { document.getElementById('game-over-screen').style.display = 'flex'; }, 1000); 
}

function gameLoop(timestamp) {
    if (gameState !== STATE.PLAYING) return;
    if (!lastTime) lastTime = timestamp; deltaTime = (timestamp - lastTime) / 1000; lastTime = timestamp; gameFrame++;
    if (gameFrame % 60 === 0) { gameTime++; score += 2; document.getElementById('time-display').innerText = gameTime; updateUI(); }

    player.update(); bullets.forEach(b => b.update()); bullets = bullets.filter(b => b.active);
    zombies.forEach(z => z.update()); drops.forEach(d => d.update()); turrets.forEach(t => t.update());
    spawnZombies();

    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= (p.decay || 0.02); }); particles = particles.filter(p => p.life > 0);
    floatingTexts.forEach(ft => { ft.y += ft.vy; ft.life -= 0.02; }); floatingTexts = floatingTexts.filter(ft => ft.life > 0);
    slashEffects.forEach(se => { se.life -= 0.1; }); slashEffects = slashEffects.filter(se => se.life > 0);

    let targetCamX = player.x - camera.width / 2; let targetCamY = player.y - camera.height / 2 + 100/ZOOM; 
    targetCamX = Math.max(camera.bounds.minX, Math.min(targetCamX, camera.bounds.maxX - camera.width));
    targetCamY = Math.max(camera.bounds.minY, Math.min(targetCamY, camera.bounds.maxY - camera.height));
    camera.x += (targetCamX - camera.x) * 0.1; camera.y += (targetCamY - camera.y) * 0.1;
    
    let shakeX = 0, shakeY = 0;
    if (screenShakeAmount > 0) {
        shakeX = (Math.random() - 0.5) * screenShakeAmount; shakeY = (Math.random() - 0.5) * screenShakeAmount;
        screenShakeAmount *= 0.9; if (screenShakeAmount < 0.5) screenShakeAmount = 0;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#1a202c'; ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save(); ctx.scale(ZOOM, ZOOM); ctx.translate(shakeX, shakeY);
    
    ctx.fillStyle = '#2d3748';
    for(let i=0; i<40; i++) {
        let px = (i * 150 - camera.x * 0.2) % (camera.width * 2) - camera.width/2;
        ctx.fillRect(px, camera.bounds.maxY - camera.y - 300 - (i%3)*80, 80, 400);
    }

    ctx.fillStyle = '#4a5568'; ctx.fillRect(camera.bounds.minX - camera.x, camera.bounds.maxY - 40 - camera.y, camera.bounds.maxX - camera.bounds.minX, 40);
    ctx.strokeStyle = '#e53e3e'; ctx.lineWidth = 5; ctx.beginPath();
    ctx.moveTo(camera.bounds.minX - camera.x, 0); ctx.lineTo(camera.bounds.minX - camera.x, WORLD_HEIGHT);
    ctx.moveTo(camera.bounds.maxX - camera.x, 0); ctx.lineTo(camera.bounds.maxX - camera.x, WORLD_HEIGHT); ctx.stroke();

    buildings.forEach(b => b.draw()); chests.forEach(c => c.draw());
    drops.forEach(d => d.draw()); turrets.forEach(t => t.draw());
    if (player.hp > 0) player.draw();
    zombies.forEach(z => z.draw()); bullets.forEach(b => b.draw());

    slashEffects.forEach(se => {
        let sx = player.x + player.width/2 - camera.x; let sy = player.y + player.height/2 - camera.y;
        ctx.save(); ctx.translate(sx, sy); ctx.rotate(se.angle);
        ctx.strokeStyle = `rgba(255, 255, 255, ${se.life})`; ctx.lineWidth = 4; ctx.beginPath();
        ctx.arc(0, 0, WEAPONS.KNIFE.range, -Math.PI/4, Math.PI/4); ctx.stroke(); ctx.restore();
    });

    particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x - camera.x, p.y - camera.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; });
    floatingTexts.forEach(ft => {
        ctx.globalAlpha = ft.life; ctx.fillStyle = ft.color; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
        ctx.strokeStyle = "black"; ctx.lineWidth = 2;
        ctx.strokeText(ft.text, ft.x - camera.x + 10, ft.y - camera.y); ctx.fillText(ft.text, ft.x - camera.x + 10, ft.y - camera.y); ctx.globalAlpha = 1.0;
    });

    let mx = mouse.worldX - camera.x; let my = mouse.worldY - camera.y;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.lineWidth = 2; ctx.beginPath();
    ctx.moveTo(mx - 10, my); ctx.lineTo(mx + 10, my); ctx.moveTo(mx, my - 10); ctx.lineTo(mx, my + 10); ctx.stroke();
    ctx.restore();

    requestAnimationFrame(gameLoop);
}

document.getElementById('start-btn').addEventListener('click', () => { initGame(); });
document.getElementById('restart-btn').addEventListener('click', () => { initGame(); });

</script>
